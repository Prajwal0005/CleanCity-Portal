<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Staff - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="admin" data-mode="tools">
  <div class="app-shell admin-shell admin-sketch">
    <aside class="admin-sidebar">
      <div class="admin-profile">
        <div class="admin-avatar"><i class="fa-solid fa-user-shield"></i></div>
        <div>
          <div class="admin-name" data-welcome>Admin</div>
          <div class="admin-role">Administrator</div>
        </div>
      </div>
      <nav class="admin-nav">
        <a class="admin-nav-item" href="admin.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
        <a class="admin-nav-item" href="admin.html#admin-complaints"><i class="fa-solid fa-list-check"></i>All Complaints</a>
        <a class="admin-nav-item" href="admin.html#admin-escalated"><i class="fa-solid fa-triangle-exclamation"></i>Escalations</a>
        <a class="admin-nav-item" href="admin-resolved.html"><i class="fa-solid fa-archive"></i>Resolved Archive</a>
        <a class="admin-nav-item" href="admin-reset.html"><i class="fa-solid fa-key"></i>Reset Password</a>
        <a class="admin-nav-item" href="admin-create-staff.html"><i class="fa-solid fa-user-plus"></i>Create Staff</a>
      </nav>
      <button class="admin-logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>Logout
      </button>
    </aside>

    <main class="admin-main">
      <div class="page-header admin-header">
        <div class="brand-title">Clean City Portal</div>
        <div class="brand-subtitle">Create Staff Account</div>
      </div>

      <div class="admin-content">
        <section class="admin-section">
          <div class="admin-section-inner">
            <h4 class="section-title">Create Staff Account</h4>
            <div class="glass-card">
              <form id="createWorkerForm" class="row g-3">
                <div class="col-md-3">
                  <label class="form-label">Name</label>
                  <input id="workerName" type="text" class="form-control" placeholder="Staff name" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label">Email</label>
                  <input id="workerEmail" type="email" class="form-control" placeholder="staff@cleancity.gov" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label">Password</label>
                  <input id="workerPassword" type="password" class="form-control" placeholder="Temporary password" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label">Role</label>
                  <select id="workerRole" class="form-select" required>
                    <option value="worker" selected>Worker</option>
                    <option value="admin">Admin</option>
                  </select>
                  <small class="text-muted d-block mt-1">Admins can create other admins.</small>
                </div>
                <div class="col-12 d-flex align-items-center gap-3">
                  <button class="btn btn-primary" type="submit">Create Account</button>
                  <span id="workerMessage" class="small"></span>
                </div>
              </form>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
