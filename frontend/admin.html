<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean City Portal - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="admin">
  <div class="app-shell admin-shell admin-sketch">
    <aside class="admin-sidebar">
      <div class="admin-profile">
        <div class="admin-avatar"><i class="fa-solid fa-user-shield"></i></div>
        <div>
          <div class="admin-name" data-welcome>Admin</div>
          <div class="admin-role">Administrator</div>
        </div>
      </div>
      <nav class="admin-nav">
        <a class="admin-nav-item" href="admin.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
        <a class="admin-nav-item" href="admin.html#admin-escalated"><i class="fa-solid fa-triangle-exclamation"></i>Escalations</a>
        <a class="admin-nav-item" href="admin-resolved.html"><i class="fa-solid fa-archive"></i>Resolved Archive</a>
        <a class="admin-nav-item" href="admin-reset.html"><i class="fa-solid fa-key"></i>Reset Password</a>
        <a class="admin-nav-item" href="admin-create-staff.html"><i class="fa-solid fa-user-plus"></i>Create Staff</a>
      </nav>
      <button class="admin-logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>Logout
      </button>
    </aside>

    <main class="admin-main">
      <div class="page-header admin-header">
        <div class="brand-title">Clean City Portal</div>
        <div class="brand-subtitle">Admin Dashboard</div>
      </div>

      <div class="admin-content">
        <section class="admin-section" id="admin-dashboard">
          <div class="admin-section-inner">
            <div class="row g-3 admin-stats">
          <div class="col-md-3">
            <div class="stat-card">
              <p class="text-muted mb-1">Total Complaints</p>
              <h3 id="statTotal">0</h3>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card">
              <p class="text-muted mb-1">Pending</p>
              <h3 id="statPending">0</h3>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card">
              <p class="text-muted mb-1">In Progress</p>
              <h3 id="statProgress">0</h3>
            </div>
          </div>
          <div class="col-md-3">
            <div class="stat-card">
              <p class="text-muted mb-1">Resolved</p>
              <h3 id="statResolved">0</h3>
            </div>
          </div>
        </div>
          </div>
        </section>

        <section class="admin-section" id="admin-escalated">
          <div class="admin-section-inner">
            <h4 class="section-title">Escalated Priority</h4>
            <div class="row g-3 admin-cards" id="adminEscalated"></div>
          </div>
        </section>

        <section class="admin-section" id="admin-complaints">
          <div class="admin-section-inner">
            <h4 class="section-title">All Complaints</h4>
            <div class="glass-card mb-3 admin-filters">
              <div class="row g-2 align-items-end">
                <div class="col-md-4">
                  <label class="form-label">Search</label>
                  <input id="adminSearch" type="text" class="form-control" placeholder="Search title, location, citizen">
                </div>
                <div class="col-md-3">
                  <label class="form-label">Status</label>
                  <select id="adminStatusFilter" class="form-select">
                    <option value="all">All</option>
                    <option value="pending">Pending</option>
                    <option value="assigned">Assigned</option>
                    <option value="accepted">Accepted</option>
                    <option value="work started">Work Started</option>
                    <option value="in progress">In Progress</option>
                    <option value="awaiting verification">Awaiting Verification</option>
                  </select>
                </div>
                <div class="col-md-3">
                  <label class="form-label">Issue Type</label>
                  <select id="adminTypeFilter" class="form-select">
                    <option value="all">All</option>
                  </select>
                </div>
                <div class="col-md-2 d-grid">
                  <button id="exportCsv" class="btn btn-soft">Export CSV</button>
                </div>
              </div>
            </div>
            <div class="row g-3 admin-cards" id="adminComplaints"></div>
            <div class="d-flex flex-wrap justify-content-between align-items-center mt-3 gap-2">
              <div class="d-flex align-items-center gap-2">
                <span class="text-muted small">Rows</span>
                <select id="adminPageSize" class="form-select form-select-sm" style="width: auto;">
                  <option value="6">6</option>
                  <option value="12">12</option>
                  <option value="24">24</option>
                </select>
              </div>
              <div class="d-flex align-items-center gap-2">
                <button id="adminPrev" class="btn btn-outline-secondary btn-sm">Prev</button>
                <span id="adminPageInfo" class="small text-muted">Page 1 of 1</span>
                <button id="adminNext" class="btn btn-outline-secondary btn-sm">Next</button>
              </div>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <div id="imageViewer" class="image-viewer d-none">
    <div class="image-viewer-backdrop" data-action="close-viewer"></div>
    <div class="image-viewer-content">
      <button class="image-viewer-close" type="button" data-action="close-viewer">&times;</button>
      <img id="imageViewerImg" alt="Preview">
    </div>
  </div>

  <div id="adminToastStack" class="admin-toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="js/script.js"></script>
</body>
</html>
