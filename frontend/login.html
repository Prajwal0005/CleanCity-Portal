<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean City Portal - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="login" class="eco-login">
  <div class="hanging-branches" aria-hidden="true">
    <div class="branch branch-left"></div>
    <div class="branch branch-right"></div>
  </div>
  <div class="ambient-orb orb-one"></div>
  <div class="ambient-orb orb-two"></div>
  <div class="ambient-orb orb-three"></div>

  <main class="login-shell">
    <section class="login-left">
      <div class="glass-card">
        <div class="card-top">
          <div class="pill-title">
            <span class="pill-icon"><i class="fa-solid fa-leaf"></i></span>
            <span>City Sanitation Access</span>
          </div>
        </div>
        <h1>Welcome Back</h1>
        <p class="card-desc">
          Track waste reports, monitor pickup efficiency, and keep every neighborhood clean with real-time insights.
        </p>

        <form id="loginForm" class="login-form" autocomplete="on" novalidate>
          <label class="field">
            <span>Email</span>
            <div class="input-wrap">
              <i class="fa-regular fa-envelope"></i>
              <input id="loginEmail" name="email" type="email" placeholder="you@city.gov" autocomplete="email" spellcheck="false" required>
            </div>
          </label>

          <label class="field">
            <span>Password</span>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input id="loginPassword" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" minlength="8" required>
              <button class="toggle-password" type="button" aria-label="Show password" aria-pressed="false">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </label>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" name="remember">
              <span>Remember me</span>
            </label>
            <a class="forgot" href="#" data-modal-open="forgot">Forgot password?</a>
          </div>

          <button class="primary-btn" type="submit">Login</button>
          <p class="register">
            New here? <a href="register.html">Register</a>
          </p>
        </form>
        <p id="loginError" class="text-danger mt-2" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <div id="forgotModal" class="cc-modal" role="dialog" aria-hidden="true" aria-labelledby="forgotTitle">
    <div class="cc-modal-backdrop" data-modal-close></div>
    <div class="cc-modal-card" role="document">
      <button class="cc-modal-close" type="button" data-modal-close aria-label="Close reset password modal">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <h2 id="forgotTitle">Reset your password</h2>
      <p class="cc-modal-desc">
        Enter your registered email. We will share the next steps to reset your password.
      </p>
      <form id="forgotForm" class="cc-modal-form" novalidate>
        <label class="field">
          <span>Email</span>
          <div class="input-wrap">
            <i class="fa-regular fa-envelope"></i>
            <input id="forgotEmail" name="forgotEmail" type="email" placeholder="you@city.gov" autocomplete="email" spellcheck="false" required>
          </div>
        </label>
        <button class="primary-btn" type="submit">Send reset link</button>
        <p id="forgotMessage" class="mt-2" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
