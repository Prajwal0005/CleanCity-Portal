<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean City Portal - Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="worker">
  <div class="app-shell">
    <div class="cc-navbar d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
      <div>
        <div class="brand-title">Staff Dashboard</div>
        <div class="brand-subtitle">Welcome, <span data-welcome>Staff</span></div>
      </div>
      <button class="btn btn-primary" onclick="logout()">Logout</button>
    </div>

    <div class="mt-4">
      <h4 class="section-title">Complaints</h4>
      <p id="workerActionMessage" class="small mt-2 mb-3" role="status" aria-live="polite"></p>
      <ul class="nav nav-pills mb-3" id="workerTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="assigned-tab" data-bs-toggle="pill" data-bs-target="#assigned-pane" type="button" role="tab">
            Assigned
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="resolved-tab" data-bs-toggle="pill" data-bs-target="#resolved-pane" type="button" role="tab">
            Resolved
          </button>
        </li>
      </ul>
      <div class="tab-content">
        <div class="tab-pane fade show active" id="assigned-pane" role="tabpanel">
          <div class="row g-3" id="workerComplaints"></div>
        </div>
        <div class="tab-pane fade" id="resolved-pane" role="tabpanel">
          <div class="row g-3" id="workerResolved"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
