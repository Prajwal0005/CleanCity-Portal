<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean City Portal - Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="reset" class="eco-login">
  <div class="ambient-orb orb-one"></div>
  <div class="ambient-orb orb-two"></div>
  <div class="ambient-orb orb-three"></div>

  <main class="login-shell">
    <section class="login-left">
      <div class="glass-card reset-card">
        <div class="card-top">
          <div class="pill-title">
            <span class="pill-icon"><i class="fa-solid fa-shield-heart"></i></span>
            <span>Password Reset</span>
          </div>
        </div>
        <h1>Set a new password</h1>
        <p class="card-desc">
          Create a strong password to secure your CleanCity account.
        </p>

        <form id="resetForm" class="login-form" novalidate>
          <label class="field">
            <span>New Password</span>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input id="resetPassword" name="resetPassword" type="password" placeholder="Enter new password" minlength="8" autocomplete="new-password" required>
              <button class="toggle-password" type="button" data-toggle="password" data-target="resetPassword" aria-label="Show password" aria-pressed="false">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </label>

          <label class="field">
            <span>Confirm Password</span>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input id="resetConfirm" name="resetConfirm" type="password" placeholder="Confirm new password" minlength="8" autocomplete="new-password" required>
              <button class="toggle-password" type="button" data-toggle="password" data-target="resetConfirm" aria-label="Show password" aria-pressed="false">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </label>

          <button class="primary-btn" type="submit">Update password</button>
          <p id="resetMessage" class="mt-2" role="status" aria-live="polite"></p>
          <p class="register">
            Back to <a href="index.html">Login</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
