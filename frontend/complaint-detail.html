<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaint Details - Clean City Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="complaint-detail" class="citizen-sketch">
  <div class="app-shell detail-shell">
    <header class="detail-header-bar">
      <div>
        <h1 id="detailTitle">Complaint Details</h1>
        <p class="text-muted mb-0">Full complaint information</p>
      </div>
      <a class="btn btn-soft" href="citizen.html#complaints">
        <i class="fa-solid fa-arrow-left"></i>
        Back to My Complaints
      </a>
    </header>

    <div class="detail-card">
      <div class="detail-top">
        <span class="detail-status-pill" id="detailStatus">Pending</span>
        <span id="detailMessage" class="text-muted small"></span>
      </div>

      <div class="detail-grid">
        <div class="detail-block">
          <h5>Before Image</h5>
          <div class="detail-image-box">
            <img id="detailBeforeImg" class="d-none" alt="Before image">
            <div id="detailBeforeEmpty" class="detail-empty">No image uploaded</div>
          </div>
        </div>
        <div class="detail-block">
          <h5>After Image</h5>
          <div class="detail-image-box">
            <img id="detailAfterImg" class="d-none" alt="After image">
            <div id="detailAfterEmpty" class="detail-empty">Not resolved yet</div>
          </div>
        </div>
      </div>

      <div class="detail-info">
        <div>
          <span>Category</span>
          <strong id="detailType">—</strong>
        </div>
        <div>
          <span>Location</span>
          <strong id="detailLocation">—</strong>
        </div>
        <div>
          <span>Submitted</span>
          <strong id="detailDate">—</strong>
        </div>
        <div>
          <span>Phone</span>
          <strong id="detailPhone">—</strong>
        </div>
        <div>
          <span>Completed By</span>
          <strong id="detailWorker">—</strong>
        </div>
      </div>

      <div class="detail-desc">
        <h5>Description</h5>
        <p id="detailDesc">—</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
