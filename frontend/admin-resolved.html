<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean City Portal - Resolved Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body data-page="admin-resolved">
  <div class="app-shell">
    <div class="cc-navbar d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
      <div>
        <div class="brand-title">Resolved Archive</div>
        <div class="brand-subtitle">Reviewed by <span data-welcome>Admin</span></div>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-soft" href="admin.html">
          <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
        <button class="btn btn-primary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="mt-4">
      <h4 class="section-title">Resolved Complaints</h4>
      <div class="glass-card mb-3">
        <div class="row g-2 align-items-end">
          <div class="col-md-5">
            <label class="form-label">Search</label>
            <input id="adminSearch" type="text" class="form-control" placeholder="Search title, location, citizen">
          </div>
          <div class="col-md-4">
            <label class="form-label">Issue Type</label>
            <select id="adminTypeFilter" class="form-select">
              <option value="all">All</option>
            </select>
          </div>
          <div class="col-md-3 d-grid">
            <button id="exportCsv" class="btn btn-soft">Export CSV</button>
          </div>
        </div>
      </div>
      <div class="row g-3" id="adminComplaints"></div>
      <div class="d-flex flex-wrap justify-content-between align-items-center mt-3 gap-2">
        <div class="d-flex align-items-center gap-2">
          <span class="text-muted small">Rows</span>
          <select id="adminPageSize" class="form-select form-select-sm" style="width: auto;">
            <option value="6">6</option>
            <option value="12">12</option>
            <option value="24">24</option>
          </select>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button id="adminPrev" class="btn btn-outline-secondary btn-sm">Prev</button>
          <span id="adminPageInfo" class="small text-muted">Page 1 of 1</span>
          <button id="adminNext" class="btn btn-outline-secondary btn-sm">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div id="imageViewer" class="image-viewer d-none">
    <div class="image-viewer-backdrop" data-action="close-viewer"></div>
    <div class="image-viewer-content">
      <button class="image-viewer-close" type="button" data-action="close-viewer">&times;</button>
      <img id="imageViewerImg" alt="Preview">
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
